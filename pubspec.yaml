name: water_reminder
description: "A professional water drinking reminder app with customizable intervals and daily tracking."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  flutter_local_notifications: ^17.1.2
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  table_calendar: ^3.1.2
  timezone: ^0.9.4
  percent_indicator: ^4.2.3
  audioplayers: ^6.6.0
  flutter_background_service: ^5.1.0
  device_info_plus: ^12.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/
    - assets/icon/
